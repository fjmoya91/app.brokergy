events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Subida de documentación del expediente (incl. vídeos). Alineado con multer (120MB).
    client_max_body_size 120m;

    server {
        listen 80;
        server_name app.brokergy.es;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API proxy
        location /api/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
        }

        # Health check
        location /health {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
        }

        # SPA
        root /usr/share/nginx/html;
        index index.html;

        # Módulos ES (.mjs, p.ej. worker de pdf.js): el mime.types por defecto no los
        # mapea → sin esto se sirven como application/octet-stream y el navegador
        # rechaza el módulo dinámico.
        location ~ \.mjs$ {
            default_type text/javascript;
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
