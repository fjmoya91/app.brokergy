<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <!-- Tema día/noche: sembrar la clase antes de pintar para evitar el "flash"
       de tema incorrecto. Por defecto (sin nada guardado) → oscuro. -->
  <script>
    (function () {
      try {
        if (localStorage.getItem('brokergy-theme') === 'light') {
          document.documentElement.classList.add('theme-light');
        }
      } catch (e) { /* noop */ }
    })();
  </script>
  <!-- Favicon: logo circular oficial tal cual ("BROKERGY CIRCULAR SIN FONDO"),
       con el interior blanco. -->
  <link rel="icon" type="image/png" href="/logo-brokergy-circular.png" />
  <!-- Icono al "Añadir a pantalla de inicio" en iOS (logo circular sobre tile oscuro de marca,
       no blanco; iOS no admite transparencia y la convierte en negro) -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BROKERGY" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BROKERGY · Ingeniería Energética</title>
  <meta name="description" content="Sistema de gestión de proyectos de rehabilitación energética." />
  <!-- Previsualización en WhatsApp / redes: logo rectangular tipo banner (ocupa menos
       que el circular y se ve bien en tema claro y oscuro al ir sobre fondo blanco). -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="BROKERGY · Ingeniería Energética" />
  <meta property="og:description" content="Sistema de gestión de proyectos de rehabilitación energética." />
  <meta property="og:image" content="https://app.brokergy.es/og-whatsapp.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://app.brokergy.es" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://app.brokergy.es/og-whatsapp.png" />

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAgyvK64sZQ3zOIJLQZCMfmEHUtHy0MSbs&libraries=places"></script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
