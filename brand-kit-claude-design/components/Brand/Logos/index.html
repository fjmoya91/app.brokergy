<!-- @dsCard group="Brand" -->
<link rel="stylesheet" href="../../../styles.css" />
<div style="font-family: var(--font-family); background: var(--bkg-base); padding: 32px; color: var(--text-primary);">
  <h2 style="margin: 0 0 4px; font-size: 20px; font-weight: 700;">Brokergy — Logos</h2>
  <p style="margin: 0 0 24px; color: var(--text-secondary); font-size: 13px;">Variantes del isotipo/logotipo para fondo oscuro, claro y circular.</p>
  <div style="display:flex; gap:20px; flex-wrap:wrap;">
    <div style="width:180px; padding:20px; border-radius:14px; background:#0C0E12; display:flex; align-items:center; justify-content:center;">
      <img src="../../../logos/logo-white.png" alt="Logo blanco (fondo oscuro)" style="max-width:100%; max-height:80px;" />
    </div>
    <div style="width:180px; padding:20px; border-radius:14px; background:#FFFFFF; border:1px solid var(--border-default); display:flex; align-items:center; justify-content:center;">
      <img src="../../../logos/logo-dark.png" alt="Logo oscuro (fondo claro)" style="max-width:100%; max-height:80px;" />
    </div>
    <div style="width:180px; padding:20px; border-radius:14px; background:var(--bkg-surface); border:1px solid var(--border-default); display:flex; align-items:center; justify-content:center;">
      <img src="../../../logos/logo-circular.png" alt="Isotipo circular" style="max-width:100%; max-height:80px;" />
    </div>
    <div style="width:180px; padding:20px; border-radius:14px; background:var(--bkg-surface); border:1px solid var(--border-default); display:flex; align-items:center; justify-content:center;">
      <img src="../../../logos/logo-admin.png" alt="Logo admin" style="max-width:100%; max-height:80px;" />
    </div>
    <div style="width:180px; padding:20px; border-radius:14px; background:var(--bkg-surface); border:1px solid var(--border-default); display:flex; align-items:center; justify-content:center;">
      <img src="../../../logos/icon-512.png" alt="Icono app (favicon/PWA)" style="max-width:80px; max-height:80px;" />
    </div>
  </div>
</div>
